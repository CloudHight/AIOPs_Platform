AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: CloudWatch Anomaly Detection & Auto-Remediation System

Globals:
  Function:
    Timeout: 900
    MemorySize: 1024
    Runtime: python3.12
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: anomaly-detection
        LOG_LEVEL: INFO
        SOLUTION_VERSION: 1.0.0
        ENVIRONMENT: !Ref Environment
    Tracing: Active

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod
  
  AnomalyScoreThresholdCPU:
    Type: Number
    Default: 0.85
    MinValue: 0.0
    MaxValue: 10.0
    Description: Minimum RCF score to trigger CPU anomaly alerts
  
  AnomalyScoreThresholdLog:
    Type: Number
    Default: 0.80
    MinValue: 0.0
    MaxValue: 10.0
    Description: Minimum RCF score to trigger log anomaly alerts
  
  GracePeriodMinutes:
    Type: Number
    Default: 1
    MinValue: 1
    MaxValue: 60
    Description: Minutes to wait before auto-remediation

  CpuRemediationMinPercent:
    Type: Number
    Default: 75.0
    MinValue: 0.0
    MaxValue: 100.0
    Description: Minimum CPU percentage required to trigger auto-remediation
  
  NotificationEmail:
    Type: String
    Default: devops-alerts@example.com
    Description: Email for SNS notifications
  
  CPUAnomalyModelEndpoint:
    Type: String
    Default: cpu-anomaly-model-endpoint
    Description: SageMaker endpoint name for CPU anomaly detection
  
  LogAnomalyModelEndpoint:
    Type: String
    Default: log-anomaly-model-endpoint
    Description: SageMaker endpoint name for log anomaly detection
  
  JiraProjectKey:
    Type: String
    Default: PROJ
    Description: Jira project key for tickets
  
  MonitoringFrequency:
    Type: String
    Default: "rate(5 minutes)"
    AllowedValues:
      - "rate(1 minute)"
      - "rate(5 minutes)"
      - "rate(15 minutes)"
      - "rate(30 minutes)"
      - "rate(1 hour)"
    Description: How often to run anomaly detection
  
  InstanceTagKey:
    Type: String
    Default: "AnomalyMonitoring"
    Description: EC2 tag key to identify instances to monitor
  
  InstanceTagValue:
    Type: String
    Default: "enabled"
    Description: EC2 tag value to identify instances to monitor

Resources:
  # Secrets Manager for Jira credentials
  JiraCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub jira-credentials-${Environment}
      Description: Jira API credentials for anomaly detection system
      GenerateSecretString:
        SecretStringTemplate: '{"JIRA_API_URL":"https://cloudhight.atlassian.net","JIRA_USER_EMAIL":"leads@cloudhight.com","JIRA_API_TOKEN":""}'
        GenerateStringKey: "random"
        ExcludeCharacters: '"@/\'

  # Main Lambda Function
  AnomalyDetectionLambda:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: app.lambda_handler
      FunctionName: !Sub anomaly-detection-${Environment}
      Description: Detects CPU and log anomalies, creates Jira tickets, and triggers auto-remediation
      MemorySize: 1024
      Timeout: 900
      EphemeralStorage:
        Size: 512

      Policies:
        # CloudWatch permissions
        - CloudWatchReadOnlyAccess
        # SageMaker permissions
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - sagemaker:InvokeEndpoint
              Resource:
                - !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/${CPUAnomalyModelEndpoint}
                - !Sub arn:aws:sagemaker:${AWS::Region}:${AWS::AccountId}:endpoint/${LogAnomalyModelEndpoint}
        # Secrets Manager for Jira credentials
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
                - secretsmanager:DescribeSecret
              Resource: !Ref JiraCredentialsSecret
        # DynamoDB permissions
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - dynamodb:PutItem
                - dynamodb:GetItem
                - dynamodb:UpdateItem
                - dynamodb:Query
                - dynamodb:Scan
                - dynamodb:BatchWriteItem
              Resource:
                - !Sub ${AnomalyResultsTable.Arn}
                - !Sub ${AnomalyResultsTable.Arn}/index/*
        # SNS permissions
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - sns:Publish
              Resource: !Ref AnomalyNotificationTopic
        # SSM permissions
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ssm:SendCommand
                - ssm:ListCommands
                - ssm:ListCommandInvocations
                - ssm:GetParameter
                - ssm:GetParameters
                - ssm:GetParametersByPath
              Resource: "*"
        # SQS permissions
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
                - sqs:ChangeMessageVisibility
              Resource:
                - !GetAtt AnomalyProcessingQueue.Arn
                - !GetAtt AnomalyProcessingDLQ.Arn
        # EventBridge permissions
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - events:PutEvents
              Resource: "*"
        # EC2 permissions for instance discovery
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - ec2:DescribeInstances
                - ec2:DescribeTags
                - ec2:RebootInstances
              Resource: "*"
        # CloudWatch Logs permissions
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - logs:FilterLogEvents
                - logs:DescribeLogGroups
                - logs:DescribeLogStreams
              Resource: "*"
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
          DYNAMODB_TABLE: !Ref AnomalyResultsTable
          SNS_TOPIC_ARN: !Ref AnomalyNotificationTopic
          PROCESSING_QUEUE_URL: !Ref AnomalyProcessingQueue
          DLQ_URL: !Ref AnomalyProcessingDLQ
          EVENT_BUS_NAME: !GetAtt AnomalyEventBus.Name
          CPU_MODEL_ENDPOINT: !Ref CPUAnomalyModelEndpoint
          LOG_MODEL_ENDPOINT: !Ref LogAnomalyModelEndpoint
          ANOMALY_THRESHOLD_CPU: !Ref AnomalyScoreThresholdCPU
          ANOMALY_THRESHOLD_LOG: !Ref AnomalyScoreThresholdLog
          GRACE_PERIOD_MINUTES: !Ref GracePeriodMinutes
          CPU_REMEDIATION_MIN_PERCENT: !Ref CpuRemediationMinPercent
          JIRA_PROJECT_KEY: !Ref JiraProjectKey
          JIRA_CREDENTIALS_SECRET: !Ref JiraCredentialsSecret
          INSTANCE_TAG_KEY: !Ref InstanceTagKey
          INSTANCE_TAG_VALUE: !Ref InstanceTagValue
          MONITORING_FREQUENCY: !Ref MonitoringFrequency
          AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1
      Events:
        ScheduledExecution:
          Type: Schedule
          Properties:
            Schedule: !Ref MonitoringFrequency
            Name: !Sub anomaly-detection-schedule-${Environment}
            Description: Scheduled execution for anomaly detection
            Enabled: true
        SQSEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt AnomalyProcessingQueue.Arn
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 30
            Enabled: true

  # EventBridge Event Bus
  AnomalyEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub anomaly-events-${Environment}

  # EventBridge Rule to capture anomaly events
  AnomalyEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub anomaly-event-rule-${Environment}
      EventBusName: !Ref AnomalyEventBus
      Description: Rule to capture all anomaly detection events
      EventPattern:
        source:
          - !Sub anomaly-detection-${Environment}
        detail-type:
          - CPU Anomaly Detected
          - Log Anomaly Detected
        detail:
          score:
            - numeric:
                - ">"
                - 0.7
      State: ENABLED
      Targets:
        - Arn: !GetAtt AnomalyNotificationTopic.TopicArn
          Id: SendToSNS
          InputTransformer:
            InputPathsMap:
              instanceId: $.detail.instance_id
              anomalyType: $.detail.anomaly_type
              score: $.detail.score
              jiraTicket: $.detail.jira_ticket_id
            InputTemplate: |
              {
                "default": "Anomaly Detected",
                "email": {
                  "instance_id": "<instanceId>",
                  "anomaly_type": "<anomalyType>",
                  "score": "<score>",
                  "jira_ticket": "<jiraTicket>",
                  "timestamp": <aws.events.event.ingestion-time>
                }
              }

  # DynamoDB Table
  AnomalyResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub anomaly-results-${Environment}
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: anomaly_id
          AttributeType: S
        - AttributeName: timestamp
          AttributeType: S
        - AttributeName: instance_id
          AttributeType: S
        - AttributeName: model_type
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: anomaly_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: InstanceTimestampIndex
          KeySchema:
            - AttributeName: instance_id
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: ModelTypeTimestampIndex
          KeySchema:
            - AttributeName: model_type
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: StatusTimestampIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: timestamp
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: AnomalyDetection

  # SNS Topic
  AnomalyNotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub anomaly-notifications-${Environment}
      DisplayName: !Sub Anomaly Detection Notifications - ${Environment}
      KmsMasterKeyId: alias/aws/sns
      Subscription:
        - Protocol: email
          Endpoint: !Ref NotificationEmail
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Purpose
          Value: AnomalyNotifications

  # SQS Queue
  AnomalyProcessingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub anomaly-processing-queue-${Environment}
      VisibilityTimeout: 900
      MessageRetentionPeriod: 1209600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt AnomalyProcessingDLQ.Arn
        maxReceiveCount: 3
      KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: AnomalyDetection

  # Dead Letter Queue
  AnomalyProcessingDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub anomaly-dlq-${Environment}
      MessageRetentionPeriod: 1209600
      KmsMasterKeyId: alias/aws/sqs
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: AnomalyDetection
        - Key: Type
          Value: DLQ

  # DLQ CloudWatch Alarm
  DLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub anomaly-dlq-alarm-${Environment}
      AlarmDescription: Alert when DLQ has messages
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt AnomalyProcessingDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AnomalyNotificationTopic
      OKActions:
        - !Ref AnomalyNotificationTopic

  # SSM Parameter for auto-remediation config
  AutoRemediationParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /AnomalyDetection/${Environment}/AutoRemediationEnabled
      Type: String
      Value: "true"
      Description: Enable/disable auto-remediation for anomaly detection
      Tier: Standard

  # SSM Parameter for grace period
  GracePeriodParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub /AnomalyDetection/${Environment}/GracePeriodMinutes
      Type: String
      Value: !Ref GracePeriodMinutes
      Description: Grace period in minutes before auto-remediation
      Tier: Standard

  # CloudWatch Dashboard
  AnomalyDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub AnomalyDetection-${Environment}
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "width": 24,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/Lambda", "Invocations", "FunctionName", "${AnomalyDetectionLambda}", { "stat": "Sum", "label": "Lambda Invocations" }],
                  ["AWS/Lambda", "Errors", "FunctionName", "${AnomalyDetectionLambda}", { "stat": "Sum", "label": "Lambda Errors" }],
                  ["AWS/Lambda", "Duration", "FunctionName", "${AnomalyDetectionLambda}", { "stat": "Average", "label": "Avg Duration" }]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "Lambda Performance",
                "period": 300
              }
            },
            {
              "type": "metric",
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${AnomalyProcessingQueue}"],
                  ["AWS/SQS", "ApproximateNumberOfMessagesNotVisible", "QueueName", "${AnomalyProcessingQueue}"],
                  ["AWS/SQS", "ApproximateNumberOfMessagesVisible", "QueueName", "${AnomalyProcessingDLQ}", { "label": "DLQ Messages" }]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "SQS Queue Metrics",
                "period": 300
              }
            },
            {
              "type": "metric",
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/DynamoDB", "ConsumedReadCapacityUnits", "TableName", "${AnomalyResultsTable}"],
                  ["AWS/DynamoDB", "ConsumedWriteCapacityUnits", "TableName", "${AnomalyResultsTable}"]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "${AWS::Region}",
                "title": "DynamoDB Performance",
                "period": 300
              }
            }
          ]
        }

Outputs:
  AnomalyDetectionLambdaArn:
    Value: !GetAtt AnomalyDetectionLambda.Arn
    Description: Lambda Function ARN
    Export:
      Name: !Sub ${Environment}-AnomalyDetectionLambdaArn
  
  AnomalyDetectionLambdaName:
    Value: !Ref AnomalyDetectionLambda
    Description: Lambda Function Name
    Export:
      Name: !Sub ${Environment}-AnomalyDetectionLambdaName
  
  AnomalyEventBusArn:
    Value: !GetAtt AnomalyEventBus.Arn
    Description: EventBridge Event Bus ARN
    Export:
      Name: !Sub ${Environment}-AnomalyEventBusArn
  
  DynamoDBTableName:
    Value: !Ref AnomalyResultsTable
    Description: DynamoDB Table Name
    Export:
      Name: !Sub ${Environment}-AnomalyResultsTable
  
  SNSNotificationTopicArn:
    Value: !Ref AnomalyNotificationTopic
    Description: SNS Topic ARN
    Export:
      Name: !Sub ${Environment}-AnomalyNotificationTopic
  
  SQSProcessingQueueUrl:
    Value: !Ref AnomalyProcessingQueue
    Description: SQS Processing Queue URL
    Export:
      Name: !Sub ${Environment}-AnomalyProcessingQueue
  
  SQSDeadLetterQueueUrl:
    Value: !Ref AnomalyProcessingDLQ
    Description: SQS Dead Letter Queue URL
    Export:
      Name: !Sub ${Environment}-AnomalyDeadLetterQueue
  
  JiraCredentialsSecretArn:
    Value: !Ref JiraCredentialsSecret
    Description: Jira Credentials Secret ARN
    Export:
      Name: !Sub ${Environment}-JiraCredentialsSecretArn
  
  CloudWatchDashboardName:
    Value: !Ref AnomalyDashboard
    Description: CloudWatch Dashboard Name
    Export:
      Name: !Sub ${Environment}-AnomalyDashboard
